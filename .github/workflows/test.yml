name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run check-types

      - run: bun run lint

      - name: Run tests (FUSE tests skip automatically without /dev/fuse)
        run: bun test
        timeout-minutes: 10
